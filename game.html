<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spela ChainGrapplers online | Gratis BJJ-kortspelsdemo</title>
  <meta name="description" content="Prova ChainGrapplers gratis i webbläsaren. Lär dig kedja BJJ-positioner, bygga press och försvara submissions mot datorn.">
  <link rel="canonical" href="https://chaingrapplers.com/game.html">
  <meta property="og:title" content="Spela ChainGrapplers online">
  <meta property="og:description" content="Prova den kostnadsfria digitala demon av ChainGrapplers BJJ-kortspel.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://chaingrapplers.com/game.html">
  <meta property="og:image" content="https://chaingrapplers.com/Chaingrapplers.png">
  <meta property="og:locale" content="sv_SE">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260623b">
</head>
<body class="info-page">
  <div class="page-bg"></div>
  <div class="page-slash page-slash--green page-slash--top-right"></div>
  <div class="page-slash page-slash--green page-slash--top-left"></div>
  <div class="page-slash page-slash--orange page-slash--bottom-right"></div>
  <div class="page-slash page-slash--yellow page-slash--bottom-left"></div>
  <div class="page-slash page-slash--red page-slash--bottom-center"></div>
  <header class="landing-topbar frame-shell">
    <a class="landing-brand" href="index.html">
      <img src="logo.png" alt="ChainGrapplers logo" class="landing-brand-logo">
      <div class="landing-brand-copy">
        <p class="eyebrow">A BJJ Card Game</p>
        <h1>ChainGrapplers</h1>
      </div>
    </a>
    <nav class="landing-nav" aria-label="Primary">
      <a href="game.html" class="landing-nav-link" data-mobile="Demo" aria-current="page">Play the Demo</a>
      <a href="about.html" class="landing-nav-link" data-mobile="Game">Inside the Game</a>
      <a href="https://shop.chaingrapplers.com/products/chaingrapplers-card-game" class="landing-nav-link" data-mobile="Buy">Buy the Physical Game</a>
      <a href="rules.html" class="landing-nav-link" data-mobile="Rules">Rules</a>
    </nav>
  </header>

  <main id="game-card" class="app-shell game-card">
    <div class="game-scroll-shell">
      <div class="match-row">
        <article class="bot-panel frame-shell bot-bar">
          <button id="start-game-btn">New Match</button>
          <div class="bot-meter">
            <h2 id="player-2-name">Bot</h2>
            <span class="bot-meter-label">Cards in hand</span>
            <strong id="bot-card-count" class="bot-card-count">0</strong>
          </div>
          <p id="info-text" class="info-text">Start match.</p>
        </article>
      </div>

      <div id="game-content" class="game-content">
        <div class="main-inner">
          <section class="board">
            <div class="play-area">
              <article class="stack-panel discard-panel frame-shell reveal-target">
                <div class="section-head section-head--stack">
                  <h4>Discard</h4>
                </div>
                <div id="offchain-cards" class="card-lane card-lane--discard"></div>
              </article>

              <article class="arena-panel frame-shell arena-frame reveal-target chain-area">
                <div class="arena-header">
                  <div>
                    <h3>Chain Area</h3>
                  </div>
                </div>

                <div class="chain-section">
                  <div id="chain-cards" class="card-lane"></div>
                </div>
              </article>

              <article class="stack-panel draw-panel frame-shell reveal-target">
                <div class="section-head section-head--stack">
                  <h4>Draw Pile</h4>
                </div>
                <div id="draw-pile" class="draw-pile">
                  <div class="draw-pile-stack">
                    <div class="draw-pile-card" aria-label="Card back"></div>
                    <button id="draw-card-btn" class="turn-button" disabled>Draw / End Turn</button>
                  </div>
                </div>
              </article>
            </div>

            <article class="player-panel frame-shell reveal-target you-area">
              <div class="section-head section-head--stack">
                <h4>Your Hand</h4>
              </div>
              <div class="player-hand-shell">
                <div id="player-1-hand" class="hand"></div>
              </div>
            </article>
          </section>
        </div>
      </div>
    </div>
  </main>

  <div id="celebration-overlay" class="celebration-overlay">
    <div id="celebration-confetti" class="celebration-confetti"></div>
    <div class="celebration-card">
      <p class="eyebrow">Round Over</p>
      <p id="celebration-message">Winner!</p>
      <div class="celebration-actions">
        <button id="celebration-play-again-btn" type="button">Play again</button>
        <a id="celebration-buy-btn" class="celebration-buy-btn celebration-buy-btn--primary" href="https://shop.chaingrapplers.com/products/chaingrapplers-card-game">Buy now</a>
      </div>
    </div>
  </div>

  <div id="card-preview-overlay" class="card-preview-overlay" aria-hidden="true">
    <div class="card-preview-shell">
      <img id="card-preview-image" class="card-preview-image" alt="Card preview">
      <button id="card-preview-play-btn" class="card-preview-action" type="button" hidden>Play Card</button>
    </div>
  </div>

  <footer class="site-footer">
    <p>Contact: <a href="mailto:admin@chaingrapplers.com">admin@chaingrapplers.com</a></p>
  </footer>

  <script src="i18n.js?v=20260623b"></script>
  <script src="cardsData.js?v=20260421a"></script>
  <script src="script.js?v=20260623b"></script>
</body>
</html>
